stages:
  - test
  - build
  - deploy

backend:test:
  stage: test
  image: maven:3.9.9-eclipse-temurin-21
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - changes:
        - api/**/*
        - .gitlab-ci.yml
  script:
    - cd api
    - mvn -B test
  tags:
    - docker

backend:build:
  stage: build
  image: maven:3.9.9-eclipse-temurin-21
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - changes:
        - api/**/*
        - .gitlab-ci.yml
  script:
    - cd api
    - mvn -B -DskipTests package
  artifacts:
    when: always
    paths:
      - api/target/*.jar
    expire_in: 1 week
  tags:
    - docker

frontend:build:
  stage: build
  image: node:20-alpine
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - changes:
        - frontend/**/*
        - .gitlab-ci.yml
  script:
    - cd frontend
    - npm config set fetch-retries 5
    - npm config set fetch-retry-mintimeout 20000
    - npm config set fetch-retry-maxtimeout 120000
    - npm ci
    - echo "export const CLOUDMEN_ADMIN_EMAIL = '${CLOUDMEN_ADMIN_EMAIL}';" > src/env.ts
    - npm run build
  artifacts:
    when: always
    paths:
      - frontend/dist/
    expire_in: 1 week
  tags:
    - docker

deploy:production:
  stage: deploy
  image: alpine:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan $SERVER_IP >> ~/.ssh/known_hosts
  script:
    - echo "Deploying to /cloudguard on $SERVER_IP..."
    # Ensure target directories exist on the server
    - ssh $SERVER_USER@$SERVER_IP "mkdir -p /cloudguard/api/target /cloudguard/frontend"
    # Copy the docker-compose file
    - scp docker-compose.yml $SERVER_USER@$SERVER_IP:/cloudguard/
    # Copy the Dockerfiles (assuming they are in the root of api/ and frontend/)
    - scp api/Dockerfile $SERVER_USER@$SERVER_IP:/cloudguard/api/ || true
    - scp frontend/Dockerfile $SERVER_USER@$SERVER_IP:/cloudguard/frontend/ || true
    # Copy the built artifacts from the pipeline runner to the server
    - scp api/target/*.jar $SERVER_USER@$SERVER_IP:/cloudguard/api/target/
    - scp -r frontend/dist $SERVER_USER@$SERVER_IP:/cloudguard/frontend/
    # Spin up the containers
    - |
      ssh $SERVER_USER@$SERVER_IP "
        cd /cloudguard &&
        docker compose up -d --build &&
        docker system prune -af
      "
  tags:
    - docker
