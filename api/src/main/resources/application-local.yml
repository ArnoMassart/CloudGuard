spring:
  datasource:
    url: jdbc:mysql://localhost:3306/cloudguard
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

google:
  workspace:
    # Needs domain-wide delegation: https://www.googleapis.com/auth/admin.directory.customer.readonly
    # Set false only if your local SA cannot call customers.get(my_customer).
    resolve-customer-id-on-login: true
  gcp:
    project-id: cloudguard-487215