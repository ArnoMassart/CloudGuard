# ---- Server ----
server.port=8080
server.error.whitelabel.enabled=false

# ---- Database ----
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
server.servlet.context-path=/api

# ---- JWT ----

application.security.jwt.expiration=604800000
application.security.jwt.secret-key=EvwIic4TkRga3C3upjwO6U30t4X9OKGq

# ---- Auth0 Resource Server ----
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://YOUR_AUTH0_DOMAIN/

# application.properties
google.api.client-email=${GOOGLE_CLIENT_EMAIL}
google.api.private-key=${GOOGLE_PRIVATE_KEY}
# Call Directory API at login to resolve Workspace customer id (domain-wide delegation: admin.directory.customer.readonly)
google.workspace.resolve-customer-id-on-login=true

# SMTP gmail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# Recipients for feedback notifications
app.feedback.notification-emails=help@cloudmen.com

# Teamleader
teamleader.client.id=${TEAMLEADER_CLIENT_ID}
teamleader.client.secret=${TEAMLEADER_CLIENT_SECRET}
teamleader.api.base=https://api.focus.teamleader.eu
teamleader.customfield.cloudguard.id=be837dc4-8f6f-0fbd-aa52-c86aacc8c178
teamleader.customfield.primary-domain.id=47c702c9-6ae5-0d83-9b51-e52d5178c179

# Supabase
supabase.url=${SUPABASE_URL}
supabase.key=${SUPABASE_KEY}