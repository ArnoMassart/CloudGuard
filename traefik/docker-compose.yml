version: "3.9"

services:
  traefik:
    image: traefik:v3.1
    container_name: traefik
    restart: unless-stopped

    command:
      # Providers
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false

      # EntryPoints (poort 80 voor frontend, 8081 voor backend API)
      - --entrypoints.web.address=:80
      - --entrypoints.backend.address=:8081

      # Dashboard aanzetten (onveilig voor productie, handig voor testen)
      - --api.insecure=true
      - --api=true
      - --api.dashboard=true

    ports:
      - "80:80"       # Frontend
      - "8081:8081"   # API
      - "8080:8080"   # Traefik Dashboard

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

    networks:
      - traefik

networks:
  traefik:
    external: true
