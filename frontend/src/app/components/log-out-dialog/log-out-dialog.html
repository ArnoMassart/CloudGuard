<div class="logout-dialog">
  <header class="logout-dialog-header">
    <h3>Uitloggen</h3>
    <button type="button" mat-dialog-close aria-label="Sluiten">×</button>
  </header>
  <div class="logout-dialog-body">
    <p class="logout-dialog-message">Weet u zeker dat u wilt uitloggen?</p>
    <div class="logout-dialog-actions">
      <button type="button" class="logout-dialog-cancel" mat-dialog-close cdkFocusInitial>
        Annuleren
      </button>
      <button type="button" class="logout-dialog-confirm" [mat-dialog-close]="true">
        Uitloggen
      </button>
    </div>
  </div>
</div>
