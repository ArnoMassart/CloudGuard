<div class="bg-card">
  <header class="flex justify-between items-center py-4 px-5 border-b-2 border-muted/50">
    <h3 class="m-0 text-xl font-medium">{{ 'logout-dialog.title' | transloco }}?</h3>
    <button
      class="cursor-pointer text-muted-foreground"
      type="button"
      mat-dialog-close
      aria-label="Sluiten"
    >
      <i-lucide [img]="Icons.X" size="18" />
    </button>
  </header>
  <div class="p-5 flex flex-col gap-4">
    <p class="m-0 text-[15px] text-muted-foreground text-center">
      {{ 'logout-dialog.description' | transloco }}
    </p>
    <div class="flex justify-end gap-4 mt-4">
      <button
        type="button"
        class="cursor-pointer hover:bg-gray-100 border-2 border-muted/50 py-2 px-6 rounded-xl bg-transparent text-sm text-muted-foreground"
        mat-dialog-close
        cdkFocusInitial
      >
        {{ 'cancel' | transloco }}
      </button>
      <button
        type="button"
        class="hover:bg-red-600/80 cursor-pointer border-2 border-red/50 rounded-xl text-white text-sm bg-red-600 py-2 px-6"
        [mat-dialog-close]="true"
      >
        {{ 'logout' | transloco }}
      </button>
    </div>
  </div>
</div>
