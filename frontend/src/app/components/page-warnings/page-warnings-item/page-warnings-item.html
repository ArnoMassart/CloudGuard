<div class="flex gap-2 items-start">
    @if (showBullet) {
    <div class="w-1 h-1 rounded-full shrink-0 mt-1.5" [class.bg-blue-800]="isInfo"
        [class.bg-orange-800]="!isCritical && !isInfo" [class.bg-red-800]="isCritical && !isInfo">
    </div>
    }
    <span class="text-sm" [class.text-blue-700]="isInfo" [class.text-red-700]="isCritical && !isInfo"
        [class.text-orange-700]="!isCritical && !isInfo">
        <ng-content></ng-content>
    </span>
</div>
