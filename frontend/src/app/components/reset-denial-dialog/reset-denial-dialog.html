<div class="bg-white rounded-xl flex flex-col max-w-full">
    <header class="flex justify-between items-center pt-6 px-6 pb-4 border-b border-slate-100">
        <h3 class="m-0 text-xl font-medium text-slate-900 flex items-center gap-2">
            {{ 'reset-denial.title' | transloco }}
        </h3>
        <button type="button" mat-dialog-close
            class="text-slate-400 hover:text-slate-700 bg-slate-50 hover:bg-slate-100 p-1.5 rounded-md transition-colors cursor-pointer"
            aria-label="{{ 'close' | transloco }}">
            <lucide-icon [img]="Icons.X" size="18" />
        </button>
    </header>

    <div class="px-6 py-6 flex flex-col gap-5">
        <p class="m-0 text-[15px] text-slate-600 leading-relaxed">
            {{ 'reset-denial.description' | transloco }}

        </p>
        <div class="bg-slate-50 border border-slate-200 rounded-lg p-4 flex items-center gap-4">
            <div
                class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center text-primary font-medium text-sm">
                {{ data.user.name.charAt(0) | uppercase }}
            </div>
            <div class="flex flex-col">
                <span class="font-medium text-slate-900 text-sm">{{ data.user.name }}</span>
                <span class="text-sm text-slate-500">{{ data.user.email }}</span>
            </div>
        </div>
        <p class="m-0 text-[15px] text-slate-600 leading-relaxed">
            {{ 'reset-denial.description-2' | transloco }}
        </p>
    </div>

    <div class="px-6 py-4 flex justify-end gap-3 border-t border-slate-100 bg-slate-50/50 rounded-b-xl">
        <button type="button" mat-dialog-close
            class="cursor-pointer hover:bg-slate-100 border border-slate-200 py-2 px-5 rounded-lg bg-white text-sm font-medium text-slate-700 transition-colors focus:ring-2 focus:ring-slate-200 focus:outline-none">
            {{ 'cancel' | transloco }}
        </button>

        <button type="button" (click)="confirm()"
            class="cursor-pointer hover:bg-primary/90 rounded-lg text-white text-sm font-medium py-2 px-5 transition-colors shadow-sm bg-primary focus:ring-2 focus:ring-primary/50 focus:outline-none flex items-center gap-2">
            {{ 'reset-denial.confirm-btn' | transloco }}
        </button>
    </div>
</div>
