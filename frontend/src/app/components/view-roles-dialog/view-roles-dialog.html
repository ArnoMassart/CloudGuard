<div class="bg-white rounded-xl flex flex-col max-h-[85vh] w-100 max-w-full">
    <header class="flex justify-between items-start pt-6 px-6 pb-4 border-b border-slate-100">
        <div>
            <h3 class="m-0 text-xl font-medium text-slate-900">
                {{ 'profile.my-roles' | transloco }}
            </h3>
        </div>
        <button type="button" (click)="closeDialog()"
            class="text-slate-400 hover:text-slate-600 transition-colors cursor-pointer"
            aria-label="{{ 'closing' | transloco }}">
            <lucide-icon [img]="Icons.X" size="20" />
        </button>
    </header>

    <div class="flex-1 overflow-y-auto px-6 py-4 custom-scrollbar flex flex-col gap-2">
        @for (role of data.roles; track role.value) {
        <div class="px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg text-sm font-medium text-slate-700">
            {{ role.label | transloco }}
        </div>
        }
    </div>

    <div class="px-6 py-4 flex justify-end border-t border-slate-100">
        <button type="button" (click)="closeDialog()"
            class="cursor-pointer hover:bg-slate-50 border border-slate-200 py-2 px-6 rounded-lg bg-white text-sm font-medium text-slate-600 transition-colors">
            {{ 'close' | transloco }}
        </button>
    </div>
</div>
