<div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">

    <div class="flex-1 min-w-0">
        <h1 class="text-[22px] sm:text-3xl font-medium text-slate-800 mb-1 leading-tight">
            {{Title}}
        </h1>
        <p class="text-slate-500 text-sm sm:text-[15px] leading-relaxed">
            {{Description}}
        </p>
    </div>

    <div class="flex shrink-0 flex-wrap items-center gap-3 justify-end w-full sm:w-auto">
        @if (NeedAdminLink) {
        <button (click)="UtilityMethods.openAdminPage(`https://admin.google.com/ac/${this.AdminLink}`)"
            class="w-full sm:w-auto flex items-center justify-center gap-2 cursor-pointer bg-primary text-white hover:bg-primary/80 py-2 md:py-2.5 md:px-5 rounded-lg font-medium transition-colors shadow-sm">
            <span class="whitespace-nowrap text-[15px] md:text-base">{{ 'to-admin-console' | transloco }}</span>
            <lucide-icon [img]="Icons.ExternalLink" size="16"></lucide-icon>
        </button>
        }
        <ng-content select="[pageHeaderActions]"></ng-content>
    </div>

</div>
