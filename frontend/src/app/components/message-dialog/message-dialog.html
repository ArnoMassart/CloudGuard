<div class="bg-card">
  <header class="flex justify-between items-center py-4 px-5 border-b-2 border-muted/50">
    <h3 class="m-0 text-xl font-medium">{{ data.titleKey | transloco }}</h3>
    <button
      class="cursor-pointer text-muted-foreground"
      type="button"
      mat-dialog-close
      [attr.aria-label]="'preferences.dialog.close' | transloco"
    >
      <i-lucide [img]="Icons.X" size="18" />
    </button>
  </header>
  <div class="p-5 flex flex-col gap-4">
    <p class="m-0 text-[15px] text-muted-foreground">{{ data.message }}</p>
    <div class="flex justify-end mt-2">
      <button
        type="button"
        class="cursor-pointer hover:bg-muted/30 border-2 border-muted/50 py-2 px-6 rounded-xl bg-transparent text-sm text-foreground"
        mat-dialog-close
        cdkFocusInitial
      >
        {{ 'preferences.dialog.ok' | transloco }}
      </button>
    </div>
  </div>
</div>
