<div class="h-full bg-white px-4 md:py-5 py-3 rounded-lg flex justify-between items-center border-2 border-muted/50">
    <div class="flex flex-col gap-2.5 min-w-0 mr-2">
        <span class="text-xs md:text-sm text-muted-foreground leading-tight">{{Title}}</span>
        <span class="font-medium text-lg md:text-[22px]" [style.color]="getTextColor()">{{getValue()}}</span>
    </div>
    <div class="shrink-0 md:p-2.5 p-2 rounded-lg" [style.background-color]="getBackgroundColor()"
        [style.color]="getIconColor()">
        <lucide-icon [img]="Icon" class="w-4.5 h-4.5 md:w-5 md:h-5"></lucide-icon>
    </div>
</div>
