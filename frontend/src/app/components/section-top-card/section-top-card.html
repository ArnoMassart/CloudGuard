<div class="bg-white px-4 py-5 rounded-lg flex justify-between items-center border-2 border-muted/50">
    <div class="flex flex-col gap-2.5">
        <span class="text-[13px] text-muted-foreground">{{Title}}</span>
        <span class="font-medium text-[22px]" [style.color]="getTextColor()">{{getValue()}}</span>
    </div>
    <div class="p-2.5 rounded-lg" [style.background-color]="getBackgroundColor()" [style.color]="getIconColor()">
        <lucide-icon [img]="Icon" size="20"></lucide-icon>
    </div>
</div>
