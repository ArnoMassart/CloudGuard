<div
    class="min-h-screen w-full bg-navbar-background flex flex-col items-center justify-center overflow-hidden py-4 text-white md:pb-8">
    <div class="flex-1 flex flex-col items-center justify-center gap-10 mt-auto w-full max-w-md">

        <div class="flex flex-col items-center text-center gap-1">
            <lucide-icon [img]="Icons.ServerCrash" class="text-primary mb-2 w-12 h-12 md:w-14 md:h-14"></lucide-icon>
            <h1 class="text-white font-semibold text-3xl mb-1">CloudGuard</h1>
            <p class="text-white/60 text-sm">by CLOUDMEN</p>
        </div>

        <div
            class="bg-white text-black mx-5 px-5 py-7 rounded-xl flex flex-col items-center justify-center gap-3 shadow-lg">
            <div class="flex items-center justify-center bg-[#fef2f2] p-3 mt-1 rounded-4xl">
                <lucide-icon [img]="Icons.TriangleAlert" class="text-orange-500 w-6 h-6 md:w-7 md:h-7"></lucide-icon>
            </div>

            <h2 class="flex justify-center text-xl">{{ 'server-error.title' | transloco }}</h2>

            <span class="flex items-center justify-center text-center text-black/50 mb-3 px-2">
                {{ 'server-error.description' | transloco }}
            </span>

            <div
                class="bg-[#f9fafb] py-3 px-3 mb-3 text-black/50 text-center text-[13px] rounded-lg border-muted border">
                <span class="font-semibold">{{ 'state' | transloco }}: </span>
                <span>{{ 'server-error.state.description' | transloco }}</span>
            </div>

            <button (click)="tryAgain()"
                class="bg-primary text-white w-full p-2 rounded-lg hover:bg-primary/80 cursor-pointer">
                {{ 'server-error.try-again' | transloco }}
            </button>
        </div>
    </div>

    <div class="text-center text-sm text-white/60 mt-8">
        <app-language-bar />

        <p class="pt-5">Powered by <span class="text-primary font-medium">CLOUDMEN</span></p>
    </div>
</div>
