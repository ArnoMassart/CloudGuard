<div
    class="min-h-screen w-full bg-navbar-background flex flex-col items-center justify-center relative overflow-hidden p-8 text-white">
    <div class="flex-1 flex flex-col items-center justify-center gap-10 mt-auto w-full max-w-md">

        <div class="flex flex-col items-center text-center gap-1">
            <lucide-icon [img]="Icons.ServerCrash" size="56" class="text-primary mb-2"></lucide-icon>
            <h1 class="text-white font-semibold text-3xl mb-1">CloudGuard</h1>
            <p class="text-white/60 text-sm">by CLOUDMEN</p>
        </div>

        <div
            class="bg-white text-black mx-5 px-5 py-7 rounded-xl flex flex-col items-center justify-center gap-3 shadow-lg">
            <div class="flex items-center justify-center bg-[#fef2f2] p-3 mt-1 rounded-4xl">
                <lucide-icon [img]="Icons.TriangleAlert" size="28" class="text-orange-500"></lucide-icon>
            </div>

            <h2 class="flex justify-center text-xl font-semibold">Systeem onbereikbaar</h2>

            <span class="flex items-center justify-center text-center text-black/60 mb-3 text-sm px-2">
                We kunnen momenteel geen verbinding maken met de CloudGuard servers. Het systeem is mogelijk in
                onderhoud of tijdelijk offline.
            </span>

            <div
                class="bg-[#f9fafb] py-3 px-3 mb-3 text-black/60 text-center text-[13px] rounded-lg border-muted border">
                <span class="font-semibold text-black">Status: </span>
                <span>Onze technici zijn op de hoogte. Probeer het over enkele minuten opnieuw.</span>
            </div>

            <button (click)="tryAgain()"
                class="bg-primary text-white w-full p-2.5 rounded-lg hover:bg-primary/90 transition-colors cursor-pointer font-medium">
                Probeer opnieuw
            </button>
        </div>
    </div>

    <div class="mt-auto mb-8 text-center text-sm text-white/60">
        <p class="mb-1">Powered by <span class="text-primary font-medium">CLOUDMEN</span></p>
    </div>
</div>
