<div class="login-page bg-navbar-background py-4 md:py-8 overflow-hidden">
  <!-- Branding header -->
  <header class="login-header">
    <i-lucide [img]="Icons.ShieldCheck" class="logo-icon w-12 h-12 md:w-14 md:h-14" />
    <h1 class="brand-title text-3xl">CloudGuard</h1>
    <p class="brand-subtitle">by CLOUDMEN</p>
  </header>
  <div class="mx-5">
    <!-- Main content card -->
    <main class="login-card">
      <section class="login-section">
        <h2 class="card-heading flex justify-center">{{ 'login.welcome-back' | transloco }}</h2>
        <p class="card-instruction">
          {{ 'login.description' | transloco }}
        </p>
        <button type="button" class="google-button" (click)="loginWithGoogle()">
          <svg class="google-icon" viewBox="0 0 24 24">
            <path fill="#4285F4"
              d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
            <path fill="#34A853"
              d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
            <path fill="#FBBC05"
              d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
            <path fill="#EA4335"
              d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
          </svg>
          <span>{{ 'login.google' | transloco }}</span>
        </button>
        <p class="security-notice">{{ 'login.secured-with-sso' | transloco }}</p>
      </section>

      <div class="card-separator"></div>

      <section class="info-section">
        <h2 class="card-heading">{{ 'login.what-is-cloudguard' | transloco }}?</h2>
        <p class="card-description">
          {{ 'login.cloudguard-explanation' | transloco }}
        </p>
      </section>
    </main>
  </div>

  <!-- Footer -->
  <footer class="text-center text-sm text-white/60 mt-8">
    <app-language-bar />

    <p class="pt-5">Powered by <span class="text-primary font-medium">CLOUDMEN</span></p>
  </footer>
</div>
