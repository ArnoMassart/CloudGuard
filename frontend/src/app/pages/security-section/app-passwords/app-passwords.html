<div class="px-10 py-6">
    <app-page-header Title="App-wachtwoorden"
        Description="Controleer door gebruikers geconfigureerde app-wachtwoorden voor minder veilige apps"
        AdminLink="devices/list?default=true&category=mobile" />

    <div class="w-full flex flex-col gap-5 pt-6">
        <div class="w-full flex gap-4">
            <app-section-top-card class="flex-1" Title="Toegestaan" [Value]="pageOverview()?.allowed? 'Ja' : 'Nee'" BackgroundColor="#dbfce7" IconColor="#17b04f" TextColor="#17b04f"
                [Icon]="Icons.ShieldCheck" />
            <app-section-top-card class="flex-1" Title="Totaal app-wachtwoorden" [Value]="pageOverview()?.totalAppPasswords"
                BackgroundColor="#ffe2e2" IconColor="#e7000b" TextColor="#e7000b" [Icon]="Icons.TriangleAlert" />
            <app-section-top-card class="flex-1" Title="Hoog risico"
                [Value]="pageOverview()?.totalHighRiskAppPasswords" BackgroundColor="#dbfce7" IconColor="#17b04f"
                [Icon]="Icons.CircleCheck" />
            <app-section-top-card class="flex-1" Title="Security Score" [Value]="pageOverview()?.securityScore"
                [IsPercentage]="true" BackgroundColor="#fef9c2" IconColor="#d69518" />
        </div>
    </div>

    <div class="w-full flex flex-col gap-5 pt-6">
        <div class="bg-white rounded-lg pt-6 border-2 border-muted/50">
            <div class="flex justify-between items-center mx-5.5">
                <span class="font-medium text-lg">Gebruikers met app-wachtwoorden</span>
            </div>

            <table class="w-full text-left border-collapse mt-6">
                <thead>
                    <tr class="border-b border-t border-gray-200 bg-gray-50/50">
                        <th class="px-6 py-4 text-xs font-medium text-gray-500 uppercase"></th>
                        <th class="px-6 py-4 text-xs font-medium text-gray-500 uppercase">Gebruiker</th>
                        <th class="px-6 py-4 text-xs font-medium text-gray-500 uppercase">Rol</th>
                        <th class="px-6 py-4 text-xs font-medium text-gray-500 uppercase">App-wachtwoorden</th>
                    </tr>
                </thead>

                <tbody class="divide-y divide-gray-200">
                    @for (user of userAppPasswords(); track user.email) {
                    <tr class="hover:bg-gray-50 transition-colors cursor-pointer">

                        <td class="px-6 py-4">
                            <div class="flex flex-col">
                                <span class="font-medium text-slate-900 text-sm">{{user.name}}</span>
                                <span class="text-xs text-gray-500">{{ user.email }}</span>
                            </div>
                        </td>
                        <td class="px-6 py-4"><span class="text-[13px]">{{user.role}}</span></td>
                        <td class="px-6 py-4">
                            <div class="flex gap-2">
                                <i-lucide [img]="Icons.Lock" class="text-primary" size="20" />
                                <div class="flex flex-col">
                                    <span class="text-[13px] font-medium">{{user.appPasswords.length}}</span>
                                </div>
                            </div>
                        </td>
                    </tr>
                    }
                </tbody>
            </table>
        </div>
    </div>

</div>
