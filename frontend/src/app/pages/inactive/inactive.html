<div
    class="min-h-screen w-full bg-navbar-background flex flex-col items-center justify-center overflow-hidden py-4 text-white md:pb-8">
    <div class="flex-1 flex flex-col items-center justify-center gap-10 mt-auto w-full max-w-md">

        <div class="flex flex-col items-center text-center gap-1">
            <lucide-icon [img]="Icons.ShieldCheck" class="text-primary mb-2 w-12 h-12 md:w-14 md:h-14"></lucide-icon>
            <h1 class="text-white font-semibold text-3xl mb-1">CloudGuard</h1>
            <p class="text-white/60 text-sm">
                by CLOUDMEN
            </p>
        </div>

        <div
            class="bg-white text-black mx-5 px-5 py-7 rounded-xl flex flex-col items-center justify-center gap-3 w-full shadow-lg">

            <div class="flex items-center justify-center bg-[#fee2e2] p-3 mt-1 rounded-full">
                <lucide-icon [img]="Icons.UserX" size="28" class="text-destructive w-5 h-5 md:w-7 md:h-7"></lucide-icon>
            </div>

            <h2 class="flex justify-center text-xl font-medium mt-2">{{ 'inactive.title' | transloco }}</h2>
            <span class="flex items-center justify-center text-center text-black/50 mb-3 leading-relaxed">
                {{ 'inactive.description' | transloco }}
            </span>

            <div
                class="bg-[#f9fafb] py-3 px-4 mb-3 text-black/60 text-center text-[13px] rounded-lg border-muted border w-full">
                <span class="font-semibold text-black/80">{{ 'forbidden.note' | transloco }}: </span>
                <span>{{ 'inactive.sub-description' | transloco }}</span>
            </div>

            <button (click)="backToLogin()"
                class="bg-primary text-white font-medium w-full py-2.5 px-4 rounded-lg hover:bg-primary/90 transition-all cursor-pointer shadow-sm">
                {{ 'back-to-login' | transloco }}
            </button>
        </div>

    </div>

    <div class="text-center text-sm text-white/60 mt-8">
        <app-language-bar />
        <p class="pt-5">Powered by <span class="text-primary font-medium">CLOUDMEN</span></p>
    </div>
</div>
