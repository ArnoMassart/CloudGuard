<div class="px-4 pt-20 pb-6 md:px-10 md:pb-6 lg:px-10 lg:py-6">
  <app-page-header Title="{{ 'accounts-manager' | transloco }}"
    Description="{{ 'account-manager.description' | transloco }}" [NeedAdminLink]="false" />

  <div class="flex items-center gap-6 sm:gap-10 md:gap-12 pt-4 sm:pt-6 border-b border-gray-200">
    <button (click)="togglePage('USERS')"
      class="flex shrink-0 items-center gap-2 pb-3 transition-all duration-200 font-medium"
      [ngClass]="getTabClass('USERS')">
      <lucide-icon [img]="Icons.Users" size="16"></lucide-icon>
      <span class="text-sm">{{ 'users' | transloco }}</span>
    </button>

    <button (click)="togglePage('ORGANIZATIONS')"
      class="flex shrink-0 items-center gap-2 pb-3 transition-all duration-200 font-medium"
      [ngClass]="getTabClass('ORGANIZATIONS')">
      <lucide-icon [img]="Icons.Building2" size="16"></lucide-icon>
      <span class="text-sm">{{ 'account-manager.tab.org' | transloco }}</span>
    </button>
  </div>

  @if (currentSection() === "USERS") {
  <app-accounts-manager-users />
  } @else {
  <app-accounts-manager-organizations />
  }

</div>
