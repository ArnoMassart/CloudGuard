<div class="px-4 pt-20 pb-6 md:px-10 md:pb-6 lg:px-10 lg:py-6">
    <app-page-header Title="{{ 'accounts-manager' | transloco }}"
        Description="{{ 'account-manager.description' | transloco }}" [NeedAdminLink]="false" />

    <div class="w-full flex flex-col gap-8 mt-6">
        <div class="flex items-center gap-4 cursor-pointer hover:text-gray-600" (click)="backToAccountManagement()">
            <i-lucide [img]="Icons.ArrowLeft" [size]="22" />
            <span>{{ 'account-manager.requests.back' | transloco }}</span>
        </div>

        <app-search-bar placeholder="{{ 'users.search' | transloco }}..." (searchChange)="onSearch($event)" />
        @if (usersDenied().length >= 1) {

        <div class="bg-white rounded-lg pt-6 border-2 border-muted/50">
            <div class="mx-6 mb-6">
                <span class="font-medium md:text-lg text-[17px] text-slate-900">
                    {{ 'account-manager.denied.denied-users' | transloco }}
                </span>
            </div>

            @if (isLoading()) {
            } @else if (usersDenied().length > 0) {
            <app-accounts-manager-denied-table [users]="usersDenied()" (actionClick)="openReacceptDialog($event)" />
            }

            <div [class.hidden]="usersDenied().length === 0">
                <app-pagination-bar [nextPageToken]="nextPageToken()" [isLoading]="isLoading()"
                    (loadData)="loadUsersWithRequests($event)" />
            </div>
        </div>
        } @else {
        <div class="bg-white rounded-lg pt-6 border-2 border-muted/50">
            <div class="mx-6 mb-6">
                <span class="font-medium md:text-lg text-[17px] text-slate-900">
                    {{ 'account-manager.denied.none' | transloco }}
                </span>
            </div>
        </div>
        }
    </div>
</div>
