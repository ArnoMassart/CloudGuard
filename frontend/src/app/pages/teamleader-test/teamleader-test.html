<div class="p-8 max-w-4xl mx-auto">
    <div class="bg-white shadow rounded-lg p-6">
        <h2 class="text-2xl font-bold mb-4 text-gray-800">Teamleader Integratie Test</h2>

        <p class="mb-6 text-gray-600">
            Klik op de knop om de bedrijfsgegevens op te halen uit Teamleader Focus.
            Er wordt gezocht op basis van het e-maildomein waarmee je momenteel bent ingelogd.
        </p>

        <button (click)="fetchData()"
            class="bg-blue-600 text-white px-6 py-2 rounded shadow hover:bg-blue-700 disabled:opacity-50 transition-colors"
            [disabled]="isLoading()">
            {{ isLoading() ? 'Laden...' : 'Haal Bedrijfsdata Op' }}
        </button>
    </div>

    @if (rawData()) {
    <div class="mt-6 bg-gray-900 rounded-lg shadow-lg overflow-hidden">
        <div class="bg-gray-800 px-4 py-2 border-b border-gray-700">
            <span class="text-sm text-gray-400 font-mono">Teamleader API Response (JSON)</span>
        </div>
        <div class="p-4 overflow-auto max-h-150">
            <pre class="text-sm font-mono text-green-400 m-0">{{ rawData() | json }}</pre>
        </div>
    </div>
    }

</div>
